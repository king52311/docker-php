services:
  php:
    build:
      context: .
      dockerfile: php.Dockerfile   # 使用自定义的 Dockerfile 编译 PHP 8.2
    container_name: php-app
    restart: always
    volumes:
      - ./src:/var/www/html        # 🔥 核心：代码目录映射
    environment:
      - TZ=Asia/Shanghai

  nginx:
    image: nginx:alpine
    container_name: nginx-php
    restart: always
    ports:
      - "80:80"                    # 暴露宿主机的 80 端口
    volumes:
      - ./src:/var/www/html        # Nginx 必须和 PHP 映射相同的代码路径
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro # 挂载虚拟主机配置
    depends_on:
      - php                        # 确保 PHP 先启动
    environment:
      - TZ=Asia/Shanghai